<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester Wyspy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    Dziękujemy za wchodzenie na tester
</header>

<div class="layout">
    <aside class="side left"></aside>

    <main class="content">
        <img src="Images/Island.png" class="hero" alt="Wyspa">

        <div class="question-box">
            <p class="question-text">Pytanie: Czy byłeś na wyspie?</p>
            <div id="random-answer" class="answer-text">TAK!</div>
        </div>

        <div class="info">
            Zrobione dla @obczajam w czystym HTML i CSS
        </div>

        <div class="yt">
            <a href="https://www.youtube.com/@obczajam" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/YouTube_social_white_squircle_%282017%29.svg" alt="YouTube">
            </a>
        </div>
    </main>

    <aside class="side right"></aside>
</div>

<script>
    const answers = ["TAK!", "NIE!"];
    const randomIndex = Math.floor(Math.random() * answers.length);
    const display = document.getElementById("random-answer");
    const result = answers[randomIndex];

    display.innerText = result;

    if (result === "NIE!") {
        display.classList.add("red-mode");
    }
</script>

</body>
</html>
